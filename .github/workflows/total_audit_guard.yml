name: Total Audit Guard (v2 - graceful)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Repo snapshot
        shell: bash
        run: |
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          ls -la

      - name: Phase map check (graceful)
        shell: bash
        run: |
          if [ -f docs/phase_map_v2.csv ]; then
            echo "OK: docs/phase_map_v2.csv found"
          else
            echo "::warning::docs/phase_map_v2.csv not found (allowed in v2)"
          fi

      - name: Locked phases check (graceful)
        shell: bash
        run: |
          if [ -f locked_phases.json ]; then
            echo "OK: locked_phases.json found"
          else
            echo "::warning::locked_phases.json not found (allowed in v2)"
          fi

      - name: Legal directory check (graceful)
        shell: bash
        run: |
          if [ -d legal ]; then
            echo "OK: legal/ present"
          else
            echo "::warning::legal/ not found (allowed in v2)"
          fi

      - name: Archive directory check (graceful)
        shell: bash
        run: |
          if [ -d archive ]; then
            echo "OK: archive/ present"
          else
            echo "::warning::archive/ not found (allowed in v2)"
          fi

      - name: Tests (non-blocking)
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest || echo "::warning::pytest failed (non-blocking in v2)"
          else
            echo "::warning::tests/ not found"
          fi

      - name: Audit summary
        shell: bash
        run: |
          echo "Total Audit Guard v2 completed"
          echo "All checks are graceful by design"
